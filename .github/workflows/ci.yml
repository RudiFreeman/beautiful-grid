name: CI

# Запускается на каждый PR в main и на прямой пуш в main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend: lint + type-check ──────────────────────────────────────────────
  frontend:
    name: Frontend (lint + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run build -- --mode production 2>&1 | grep -v "^$" || true
        # tsc -b проверяет типы; vite build в случае ошибок типов завалится

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

  # ── Tauri build: macOS arm64 ─────────────────────────────────────────────────
  build-macos:
    name: Build (macOS arm64)
    runs-on: macos-latest   # GitHub-hosted = macOS 14 (Apple Silicon)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Node dependencies
        run: npm ci

      - name: Cargo fmt check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Cargo clippy
        working-directory: src-tauri
        run: cargo clippy --target aarch64-apple-darwin -- -D warnings

      - name: Build Tauri app (arm64)
        run: npm run tauri build -- --target aarch64-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""   # подпись не требуется в CI для Sprint 0

  # ── Tauri build: Windows x64 ─────────────────────────────────────────────────
  build-windows:
    name: Build (Windows x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Node dependencies
        run: npm ci

      - name: Cargo fmt check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Cargo clippy
        working-directory: src-tauri
        run: cargo clippy --target x86_64-pc-windows-msvc -- -D warnings

      - name: Build Tauri app (Windows x64)
        run: npm run tauri build -- --target x86_64-pc-windows-msvc
